# NVIDIA GPU override — use with:
#   docker compose -f docker-compose.yml -f docker-compose.nvidia.yml up -d

services:
  ollama:
    image: ollama/ollama:latest
    container_name: loglm-ollama
    restart: unless-stopped
    volumes:
      - ${STORAGE_PATH:-./data}/ollama:/root/.ollama
    networks:
      br0:
        ipv4_address: 10.20.10.108
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 30
    entrypoint: >
      /bin/sh -c "
        ollama serve &
        sleep 5
        ollama pull $${OLLAMA_MODEL_DEEP:-llama3.1:8b-instruct-q4_K_M}
        ollama pull $${OLLAMA_MODEL_FAST:-llama3.2:1b}
        wait
      "

  analyzer:
    depends_on:
      ollama:
        condition: service_started
