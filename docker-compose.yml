services:

  # ── Syslog receiver (pure Python, multi-arch) ───────────────────────────────
  syslog:
    build: ./rsyslog
    container_name: loglm-syslog
    restart: unless-stopped
    ports:
      - "514:514/udp"
      - "514:514/tcp"
    environment:
      REDIS_URL: redis://redis:6379
    networks:
      - loglm
    depends_on:
      - redis

  # ── SNMP trap receiver + active poller ──────────────────────────────────────
  snmp:
    build: ./snmp
    container_name: loglm-snmp
    restart: unless-stopped
    ports:
      - "162:162/udp"
    environment:
      REDIS_URL: redis://redis:6379
      POSTGRES_DSN: postgresql://loglm:${POSTGRES_PASSWORD}@postgres:5432/loglm
      SNMP_TARGETS: ${SNMP_TARGETS:-}
      SNMP_COMMUNITY: ${SNMP_COMMUNITY:-public}
      SNMP_POLL_INTERVAL: ${SNMP_POLL_INTERVAL:-60}
    networks:
      - loglm
    depends_on:
      - redis

  # ── Log processing pipeline ──────────────────────────────────────────────────
  processor:
    build: ./processor
    container_name: loglm-processor
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      POSTGRES_DSN: postgresql://loglm:${POSTGRES_PASSWORD}@postgres:5432/loglm
      LOKI_URL: http://loki:3100
      LIBRENMS_URL: ${LIBRENMS_URL:-}
      LIBRENMS_TOKEN: ${LIBRENMS_TOKEN:-}
    networks:
      - loglm
    depends_on:
      - redis
      - postgres
      - loki

  # ── LLM anomaly analyzer + memory summariser ────────────────────────────────
  analyzer:
    build: ./analyzer
    container_name: loglm-analyzer
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      POSTGRES_DSN: postgresql://loglm:${POSTGRES_PASSWORD}@postgres:5432/loglm
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      ALERT_COOLDOWN_SECONDS: ${ALERT_COOLDOWN_SECONDS:-300}
      ANALYSIS_INTERVAL_SECONDS: ${ANALYSIS_INTERVAL_SECONDS:-60}
      MEMORY_INTERVAL_SECONDS: ${MEMORY_INTERVAL_SECONDS:-300}
    networks:
      - loglm
    depends_on:
      - redis
      - postgres

  # ── Web UI ───────────────────────────────────────────────────────────────────
  web:
    build: ./web
    container_name: loglm-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:8000"
    environment:
      POSTGRES_DSN: postgresql://loglm:${POSTGRES_PASSWORD}@postgres:5432/loglm
      REDIS_URL: redis://redis:6379
      LOKI_URL: http://loki:3100
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      SECRET_KEY: ${SECRET_KEY:-changeme-in-production}
    networks:
      - loglm
    depends_on:
      - postgres
      - redis
      - loki

  # ── Loki (log storage) ───────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.8
    container_name: loglm-loki
    restart: unless-stopped
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - loglm

  # ── PostgreSQL (structured data) ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: loglm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: loglm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: loglm
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - loglm

  # ── Redis (message queue / pub-sub) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: loglm-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - loglm

volumes:
  ollama_models:
  loki_data:
  postgres_data:
  redis_data:

networks:
  loglm:
    driver: bridge
