services:

  # ── Syslog receiver (pure Python, multi-arch) ───────────────────────────────
  syslog:
    build:
      context: .
      dockerfile: rsyslog/Dockerfile
    container_name: loglm-syslog
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      GELF_ENABLED: ${GELF_ENABLED:-1}
      GELF_PORT: ${GELF_PORT:-12201}
      JSON_ENABLED: ${JSON_ENABLED:-1}
      JSON_PORT: ${JSON_PORT:-5140}
      TZ: ${TZ:-UTC}
    networks:
      br0:
        ipv4_address: 10.20.10.100
    depends_on:
      - redis

  # ── SNMP trap receiver + active poller ──────────────────────────────────────
  snmp:
    build:
      context: .
      dockerfile: snmp/Dockerfile
    container_name: loglm-snmp
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      POSTGRES_DSN: postgresql://loglm:${POSTGRES_PASSWORD}@postgres:5432/loglm
      SNMP_TARGETS: ${SNMP_TARGETS:-}
      SNMP_COMMUNITY: ${SNMP_COMMUNITY:-public}
      SNMP_POLL_INTERVAL: ${SNMP_POLL_INTERVAL:-60}
      TZ: ${TZ:-UTC}
    networks:
      br0:
        ipv4_address: 10.20.10.101
    depends_on:
      - redis

  # ── Log processing pipeline ──────────────────────────────────────────────────
  processor:
    build:
      context: .
      dockerfile: processor/Dockerfile
    container_name: loglm-processor
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      POSTGRES_DSN: postgresql://loglm:${POSTGRES_PASSWORD}@postgres:5432/loglm
      LOKI_URL: http://loki:3100
      LIBRENMS_URL: ${LIBRENMS_URL:-}
      LIBRENMS_TOKEN: ${LIBRENMS_TOKEN:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL_FAST: ${OLLAMA_MODEL_FAST:-llama3.2:1b}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
      PROCESSOR_USE_FAST_LLM: ${PROCESSOR_USE_FAST_LLM:-0}
      TZ: ${TZ:-UTC}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9101/healthz || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
    networks:
      br0:
        ipv4_address: 10.20.10.102
    depends_on:
      - redis
      - postgres
      - loki

  # ── LLM anomaly analyzer + memory summariser ────────────────────────────────
  analyzer:
    build:
      context: .
      dockerfile: analyzer/Dockerfile
    container_name: loglm-analyzer
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      POSTGRES_DSN: postgresql://loglm:${POSTGRES_PASSWORD}@postgres:5432/loglm
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL_DEEP: ${OLLAMA_MODEL_DEEP:-llama3.1:8b-instruct-q4_K_M}
      OLLAMA_MAX_CONCURRENT: ${OLLAMA_MAX_CONCURRENT:-2}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      ALERT_COOLDOWN_SECONDS: ${ALERT_COOLDOWN_SECONDS:-300}
      ANALYSIS_INTERVAL_SECONDS: ${ANALYSIS_INTERVAL_SECONDS:-60}
      MEMORY_INTERVAL_SECONDS: ${MEMORY_INTERVAL_SECONDS:-300}
      TZ: ${TZ:-UTC}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9102/healthz || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
    networks:
      br0:
        ipv4_address: 10.20.10.103
    depends_on:
      - redis
      - postgres

  # ── Web UI ───────────────────────────────────────────────────────────────────
  web:
    build: ./web
    container_name: loglm-web
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgresql://loglm:${POSTGRES_PASSWORD}@postgres:5432/loglm
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      LOKI_URL: http://loki:3100
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL_DEEP: ${OLLAMA_MODEL_DEEP:-llama3.1:8b-instruct-q4_K_M}
      OLLAMA_MAX_CONCURRENT: ${OLLAMA_MAX_CONCURRENT:-2}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
      LIBRENMS_URL: ${LIBRENMS_URL:-}
      LIBRENMS_TOKEN: ${LIBRENMS_TOKEN:-}
      SECRET_KEY: ${SECRET_KEY:-changeme-in-production}
      LOGLM_BOOTSTRAP_ADMIN_PASSWORD: ${LOGLM_BOOTSTRAP_ADMIN_PASSWORD:-}
      LOGLM_AUTH_DISABLED: ${LOGLM_AUTH_DISABLED:-0}
      LOGLM_AUTH_TRUST_LOOPBACK: ${LOGLM_AUTH_TRUST_LOOPBACK:-1}
      LOGLM_SESSION_HOURS: ${LOGLM_SESSION_HOURS:-24}
      TZ: ${TZ:-UTC}
      NTP_SERVER: ${NTP_SERVER:-pool.ntp.org}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8000/healthz || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      br0:
        ipv4_address: 10.20.10.104
    depends_on:
      - postgres
      - redis
      - loki

  # ── Loki (log storage) ───────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.8
    container_name: loglm-loki
    restart: unless-stopped
    user: "0:0"
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - ${STORAGE_PATH:-./data}/loki:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      br0:
        ipv4_address: 10.20.10.105

  # ── PostgreSQL (structured data) ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: loglm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: loglm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: loglm
      TZ: ${TZ:-UTC}
      PGTZ: ${TZ:-UTC}
    volumes:
      - ${STORAGE_PATH:-./data}/postgres:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loglm"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      br0:
        ipv4_address: 10.20.10.106

  # ── Redis (message queue / pub-sub) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: loglm-redis
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - ${STORAGE_PATH:-./data}/redis:/data
    command: >-
      redis-server --save 60 1 --loglevel warning
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a ${REDIS_PASSWORD}} ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      br0:
        ipv4_address: 10.20.10.107

networks:
  br0:
    external: true
    name: br0
