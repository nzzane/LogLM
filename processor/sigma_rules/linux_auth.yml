title: SSH Brute Force Attempt
id: 5cc9d520-a2ff-4a39-b1b3-a4b4c1e5a0d1
status: stable
level: high
logsource:
  product: linux
  service: auth
detection:
  selection:
    program:
      - sshd
    message|contains:
      - "Failed password"
      - "Invalid user"
      - "authentication failure"
  condition: selection
tags:
