<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogLM — Login</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; background:#0d1117; }
    .login-card { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:2rem; width:340px; }
    .login-card h1 { color:#c9d1d9; font-size:1.4rem; margin:0 0 1.5rem; text-align:center; }
    .login-card label { color:#8b949e; font-size:.85rem; display:block; margin-bottom:.3rem; }
    .login-card input[type=text],
    .login-card input[type=password] {
      width:100%; padding:.5rem; margin-bottom:1rem; background:#0d1117;
      border:1px solid #30363d; border-radius:4px; color:#c9d1d9; font-size:.95rem;
      box-sizing:border-box;
    }
    .login-card button {
      width:100%; padding:.55rem; background:#238636; color:#fff; border:none;
      border-radius:4px; font-size:.95rem; cursor:pointer;
    }
    .login-card button:hover { background:#2ea043; }
    .login-error { color:#f85149; font-size:.85rem; margin-bottom:1rem; text-align:center; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>LogLM</h1>
    {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
    <form method="POST" action="/login">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autofocus required>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
