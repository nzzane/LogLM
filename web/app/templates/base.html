<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}LogLM{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav>
    <a href="/" class="nav-brand">LogLM</a>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/logs">Logs</a>
      <a href="/alerts">Alerts</a>
      <a href="/aliases">Aliases</a>
      <a href="/chat">Chat</a>
    </div>
    <div id="live-indicator" class="live-dot disconnected" title="Live stream status"></div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
